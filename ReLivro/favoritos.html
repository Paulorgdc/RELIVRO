<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meus Favoritos - RELIVRO</title>
  <style>
    body {
      font-family: 'georgia', serif;
      background-color: #e8f5e9;
      color: #1b5e20;
      padding: 20px;
    }
    .btn-voltar {
      background-color: #388e3c;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      margin-bottom: 20px;
      transition: background-color 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }
    .btn-voltar:hover {
      background-color: #2e7030;
    }
    .livros {
      display: grid;
      grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
      gap: 20px;
    }
    .livro {
      background-color: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 0 10px rgba(56, 142, 60, 0.3);
      text-align: center;
    }
    .livro img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    .livro h3 {
      font-size: 1.25rem;
      margin-bottom: 10px;
      color: #1b5e20;
    }
    .livro p {
      font-weight: bold;
      margin-bottom: 15px;
      color: #388e3c;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
<a href="index.html" class="btn-voltar">← Voltar para Livros</a>
  <h1>Meus Favoritos</h1>
  <div class="livros" id="favoritosContainer"></div>

  <script>
    // Mesma lista fixa de livros para manter o índice consistente
    const livrosFixos = [
      {
        titulo: "Dom Casmurro",
        preco: 19.90,
        imagem: "https://images.tcdn.com.br/img/img_prod/1271663/dom_casmurro_189_1_0386b5369c5ad64fd1779fe57ced0b1c.jpg"
      },
      {
        titulo: "O Pequeno Príncipe",
        preco: 25.00,
        imagem: "https://todolivro.vtexassets.com/arquivos/ids/160172/9788533100107.jpg?v=638522497030600000"
      },
      {
        titulo: "1984",
        preco: 29.90,
        imagem: "https://cirandacultural.fbitsstatic.net/img/p/1984-70665/257179.jpg?w=520&h=520&v=no-change&qs=ignore"
      },
      {
        titulo: "Capitães da Areia",
        preco: 22.50,
        imagem: "https://www.matinaljornalismo.com.br/wp-content/uploads/2022/05/capitaesdeareia.jpeg"
      },
      {
        titulo: "Criptomoedas",
        preco: 22.50,
        imagem: "https://m.media-amazon.com/images/I/41TB3Du70CL._AC_UF1000,1000_QL80_.jpg"
      },
      {
        titulo: "As 48 leis do poder",
        preco: 45.50,
        imagem: "https://rocco.com.br/app/uploads/2023/06/9786555323603.jpg"
      },
      {
        titulo: "A Dança dos Dragões",
        preco: 83.90,
        imagem: "https://super.abril.com.br/wp-content/uploads/2024/09/91gIftSmvhL._SL1500_.jpg?quality=70&strip=info&w=1024"
      },
      {
        titulo: "O alquimista",
        preco: 39.90,
        imagem: "https://m.media-amazon.com/images/I/81slUinjTlS.jpg"
      },
      {
        titulo: "Odisseia",
        preco: 45.49,
        imagem: "https://m.media-amazon.com/images/I/71YQ4CvEWgL._AC_UF1000,1000_QL80_.jpg"
      },
      {
        titulo: "Hamlet",
        preco: 99.90,
        imagem: "https://cdn.kobo.com/book-images/695eb39e-9405-4c4b-8267-302344f0f5f7/1200/1200/False/hamlet-15.jpg"
      },
      {
        titulo: "Moby Dick",
        preco: 37.50,
        imagem: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSadiH-qLN0MgPrXJCT8iU-22NBADMS_DCbmQ&s"
      },
      {
        titulo: "Menino Maluqinho",
        preco: 29.90,
        imagem: "https://books.google.com.br/books/publisher/content?id=ziTpEAAAQBAJ&hl=pt-BR&pg=PP1&img=1&zoom=3&bul=1&sig=ACfU3U12QWV--ezggbGQhBZwjfL1p88c2g&w=1280"
      },
      {
        titulo: "The Last Of Us I",
        preco: 117.95,
        imagem: "https://m.media-amazon.com/images/I/918rQ9CXFfL._SY466_.jpg"
      },
      {
        titulo: "O alienista",
        preco: 42.99,
        imagem: "https://books.google.com.br/books/publisher/content?id=DKFJEAAAQBAJ&hl=pt-BR&pg=PP1&img=1&zoom=3&bul=1&sig=ACfU3U0iPI1udvXR6xsY0xw99FkK1Vbzhg&w=1280"
      },
    ];

    // Pega os favoritos do localStorage (índices)
    const favoritos = JSON.parse(localStorage.getItem('favoritos')) || [];

    const container = document.getElementById('favoritosContainer');

    if (favoritos.length === 0) {
      container.innerHTML = "<p>Você não marcou nenhum livro como favorito ainda.</p>";
    } else {
      favoritos.forEach(index => {
        const livro = livrosFixos[index];
        if (livro) {
          const div = document.createElement('div');
          div.className = 'livro';
          div.innerHTML = `
            <img src="${livro.imagem}" alt="${livro.titulo}">
            <h3>${livro.titulo}</h3>
            <p>Preço: R$ ${livro.preco.toFixed(2)}</p>
          `;
          container.appendChild(div);
        }
      });
    }
  </script>
</body>
</html>
