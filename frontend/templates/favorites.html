<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meus Favoritos - RELIVRO</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <a href="../index.html" class="logo-container" style="text-decoration: none;">
                <img src="../assets/images/logo.jpeg" alt="Logo Relivro" class="header-logo">
                <span class="logo">RELIVRO</span>
            </a>
            <nav class="nav-links">
                <a href="favorites.html"><i class="fa fa-heart"></i> Meus Favoritos</a>
                <a href="cart.html"><i class="fa fa-shopping-cart"></i> Meu Carrinho</a>
            </nav>
        </div>
    </header>

    <main class="cart-main-container">
        <h1 class="page-title">Meus Favoritos</h1>
        <div class="books-grid" id="favorites-container"></div>
    </main>

    <script>
document.addEventListener("DOMContentLoaded", () => {
    const currentUser = sessionStorage.getItem("currentUser");
    
    if (!currentUser) {
        window.location.href = "login.html"; 
        return; 
    }

    const navContainer = document.querySelector('.nav-links');
    if (navContainer) {
        const userLink = document.createElement('a');
        userLink.href = "#";
        userLink.innerHTML = `<i class="fa fa-user" style="margin-right: 5px;"></i> Olá, ${currentUser}`;
        userLink.title = "Clique para sair da conta";
        
        userLink.addEventListener("click", (e) => {
            e.preventDefault();
            if(confirm("Deseja sair da sua conta?")) {
                sessionStorage.removeItem("currentUser");
                window.location.href = "login.html";
            }
        });

        navContainer.insertBefore(userLink, navContainer.firstChild);
    }
    
    const container = document.getElementById("favorites-container");
    
    function renderFavorites() {
        const rawData = localStorage.getItem("favorites");
        let favorites = JSON.parse(rawData) || [];
        container.innerHTML = "";

        const validFavorites = favorites.filter(book => typeof book === "object" && book !== null && book.title);

        if (validFavorites.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fa fa-heart" style="font-size: 4rem; color: #388e3c; margin-bottom: 15px;"></i>
                    <p style="font-size: 1.2rem; color: #333; font-weight: 500; margin-bottom: 20px;">Você ainda não favoritou nenhum livro.</p>
                    <a href="../index.html" class="btn" style="text-decoration: none; display: inline-block; width: auto;">Explorar Livros</a>
                </div>
            `;
            return;
        }

        validFavorites.forEach((book, index) => {
            const card = document.createElement("div");
            card.className = "book-card";
            card.innerHTML = `
                <div class="favorite-icon active" onclick="removeFavorite(${index})">&#10084;</div>
                <img src="../${book.image}" alt="${book.title}">
                <h3>${book.title}</h3>
                <p>Preço: R$ ${Number(book.price).toFixed(2)}</p>
                <button class="btn" onclick="addToCartFromFavs(${index})">Comprar</button>
            `;
            container.appendChild(card);
        });
    }

    window.removeFavorite = (index) => {
        let favs = JSON.parse(localStorage.getItem("favorites")) || [];
        favs.splice(index, 1);
        localStorage.setItem("favorites", JSON.stringify(favs));
        renderFavorites();
    };

    window.addToCartFromFavs = (index) => {
        let favs = JSON.parse(localStorage.getItem("favorites")) || [];
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart.push(favs[index]);
        localStorage.setItem("cart", JSON.stringify(cart));
        
        const btns = document.querySelectorAll("#favorites-container .btn");
        if(btns[index]) {
            btns[index].innerText = "Adicionado!";
            btns[index].style.backgroundColor = "#1b5e20";
            setTimeout(() => {
                btns[index].innerText = "Comprar";
                btns[index].style.backgroundColor = "#388e3c";
            }, 1000);
        }
    };

    renderFavorites();
});
    </script>
</body>
</html>
