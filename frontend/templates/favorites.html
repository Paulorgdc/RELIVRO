<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Meus Favoritos - RELIVRO</title>
  <style>
    body { font-family: 'georgia', serif; background-color: #e8f5e9; padding-top: 100px; margin: 0; }
    .topo { background-color: #2e7d32; color: white; display: flex; justify-content: space-between; padding: 15px 30px; position: fixed; top: 0; width: 100%; box-sizing: border-box; }
    .menu a { color: white; text-decoration: none; margin-left: 20px; font-weight: bold; }
    .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px; }
    .book-card { background: white; padding: 15px; border-radius: 10px; text-align: center; }
    .book-card img { width: 100%; height: 250px; object-fit: cover; }
  </style>
</head>
<body>
<header class="topo">
  <div class="logo">Relivro</div>
  <nav class="menu">
    <a href="../index.html">Livros</a>
    <a href="cart.html">Carrinho</a>
  </nav>
</header>

<h1 style="padding: 20px;">Meus Favoritos</h1>
<div class="books-grid" id="favorites-container"></div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const favorites = JSON.parse(localStorage.getItem('favorites')) || [];
    const container = document.getElementById('favorites-container');

    if (favorites.length === 0) {
      container.innerHTML = "<p>Nenhum favorito ainda.</p>";
    }
  });
</script>
</body>
</html>
