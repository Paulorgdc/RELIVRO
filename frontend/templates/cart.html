<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Meu Carrinho - RELIVRO</title>
  <style>
    body { background-color: #E8F5E9; font-family: 'Georgia', serif; margin: 0; padding-top: 100px; }
    .topo { background-color: #2e7d32; color: white; display: flex; justify-content: space-between; padding: 15px 30px; position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box; }
    .menu a { color: white; text-decoration: none; margin-left: 20px; font-weight: bold; }
    .cart-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px; }
    .book-card { background: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .book-card img { width: 100%; height: 250px; object-fit: cover; border-radius: 5px; }
    .remove-btn { background: #c62828; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; }
    .footer-cart { padding: 20px; text-align: right; }
  </style>
</head>
<body>
<header class="topo">
  <div class="logo">Relivro</div>
  <nav class="menu">
    <a href="../index.html">Livros</a>
    <a href="favorites.html">Favoritos</a>
  </nav>
</header>

<h1 style="padding: 0 20px;">Meu Carrinho</h1>
<main class="cart-container" id="cart-container"></main>

<footer class="footer-cart">
  <h2 id="total-price">Total: R$ 0,00</h2>
  <button id="checkout-btn">Finalizar Compra</button>
</footer>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const container = document.getElementById('cart-container');
    const totalDisplay = document.getElementById('total-price');
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    function renderCart() {
      container.innerHTML = cart.length === 0 ? "<p>O carrinho está vazio.</p>" : "";
      let total = 0;

      cart.forEach((book, index) => {
        total += book.price;
        const div = document.createElement('div');
        div.className = 'book-card';
        div.innerHTML = `
          <img src="${book.image.startsWith('http') ? book.image : '../' + book.image}" alt="${book.title}">
          <h3>${book.title}</h3>
          <p>R$ ${book.price.toFixed(2)}</p>
          <button class="remove-btn" onclick="removeItem(${index})">Remover</button>
        `;
        container.appendChild(div);
      });
      totalDisplay.textContent = `Total: R$ ${total.toFixed(2)}`;
    }

    window.removeItem = (index) => {
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
    };

    renderCart();
  });
</script>
</body>
</html>
