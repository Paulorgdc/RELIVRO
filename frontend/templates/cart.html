<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meu Carrinho - RELIVRO</title>
    
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
<header class="main-header">
    <div class="header-content">
        <a href="../index.html" class="logo-container" style="text-decoration: none;">
            <img src="../assets/images/logo.jpeg" alt="Logo Relivro" class="header-logo">
            <span class="logo">RELIVRO</span>
        </a>

        <nav class="nav-links">
            <a href="favorites.html">
                <i class="fa fa-heart"></i> Meus Favoritos
            </a>
            <a href="cart.html">
                <i class="fa fa-shopping-cart"></i> Meu Carrinho
            </a>
        </nav>
    </div>
</header>

<main class="cart-main-container">
    <h1 class="page-title">Meu Carrinho</h1>
    
    <div class="books-grid" id="cart-container"></div>
</main>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const currentUser = sessionStorage.getItem("currentUser");
    
    if (!currentUser) {
        window.location.href = "login.html"; 
        return; 
    }

    const navContainer = document.querySelector('.nav-links');
    if (navContainer) {
        const userLink = document.createElement('a');
        userLink.href = "#";
        userLink.innerHTML = `<i class="fa fa-user" style="margin-right: 5px;"></i> Olá, ${currentUser}`;
        userLink.title = "Clique para sair da conta";
        
        userLink.addEventListener("click", (e) => {
            e.preventDefault();
            if(confirm("Deseja sair da sua conta?")) {
                sessionStorage.removeItem("currentUser");
                window.location.href = "login.html";
            }
        });

        navContainer.insertBefore(userLink, navContainer.firstChild);
    }
    
    const container = document.getElementById("cart-container");
    const totalPriceElement = document.getElementById("total-price");
    const checkoutSection = document.querySelector(".checkout-section");
    
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    function renderCart() {
        container.innerHTML = "";
        let total = 0;

        if (cart.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fa fa-shopping-cart" style="font-size: 4rem; color: #388e3c; margin-bottom: 15px;"></i>
                    <p style="font-size: 1.2rem; color: #333; font-weight: 500; margin-bottom: 20px;">Seu carrinho está vazio.</p>
                    <a href="../index.html" class="btn" style="text-decoration: none; display: inline-block; width: auto;">Voltar para a Loja</a>
                </div>
            `;
            if (checkoutSection) checkoutSection.style.display = "none";
            return;
        }

        if (checkoutSection) checkoutSection.style.display = "flex";

        cart.forEach((book, index) => {
            total += book.price;
            const card = document.createElement("div");
            card.className = "book-card";
            card.innerHTML = `
                <img src="../${book.image}" alt="${book.title}">
                <h3>${book.title}</h3>
                <p>R$ ${book.price.toFixed(2)}</p>
                <button class="btn" style="background-color: #e53935;" onclick="removeItem(${index})">Remover</button>
            `;
            container.appendChild(card);
        });

        totalPriceElement.innerText = `R$ ${total.toFixed(2)}`;
    }

    window.removeItem = (index) => {
        cart.splice(index, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart();
    };

    renderCart();
});
</script>

<div class="checkout-section">
    <div class="total-box">
        <span>Total da Compra</span>
        <strong id="total-price">R$ 0,00</strong>
    </div>
    <button class="btn-checkout" onclick="openPaymentModal()">
        Finalizar Compra
    </button>
</div>
</body>
</html>
