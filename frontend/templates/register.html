<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="../assets/css/register.css">
    <title>Cadastrar - Re-Livro</title>
</head>
<body>
    <div class="container">
      <div class="card">
        <h1>Re-Livro</h1>
        <h2>Cadastrar</h2>

        <div id="msg-error"></div>
        <div id="msg-success"></div>

        <div class="label-float">
          <input type="text" id="name" placeholder=" " required />
          <label id="labelName" for="name">Nome Completo</label>
        </div>

        <div class="label-float">
          <input type="text" id="username" placeholder=" " required />
          <label id="labelUsername" for="username">Usuário</label>
        </div>

        <div class="label-float">
          <input type="password" id="password" placeholder=" " required />
          <label id="labelPassword" for="password">Senha</label>
          <i id="viewPassword" class="fa fa-eye" aria-hidden="true"></i>
        </div>

        <div class="label-float">
          <input type="password" id="confirm-password" placeholder=" " required />
          <label id="labelConfirmPassword" for="confirm-password">Confirmar Senha</label>
          <i id="viewConfirmPassword" class="fa fa-eye" aria-hidden="true"></i>
        </div>

        <div class="justify-center">
          <button onclick="register()">Cadastrar</button>
        </div>
      </div>
    </div>
    <script src="../assets/js/register.js"></script>
</body>
</html>
